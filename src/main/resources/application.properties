# ===============================
# DATABASE (MySQL - Local)
# ===============================
# Create the database first: CREATE DATABASE sim_portal;
spring.datasource.url=jdbc:mysql://localhost:3306/sim_portal?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=user123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# No need to specify dialect – Spring Boot auto-detects MySQL8Dialect

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false