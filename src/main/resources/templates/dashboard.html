<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SIM Activation Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { margin-bottom: 20px; }
        .result-area { margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">SIM Activation Portal</span>
        <div>
            <a href="/manage-customers" class="btn btn-outline-light me-2">Manage Customers</a>
            <button id="logoutBtn" class="btn btn-outline-light">Logout</button>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6">
            <!-- SIM Management Card (only Validate SIM, no status badge) -->
            <div class="card">
                <div class="card-header bg-success text-white">SIM Management</div>
                <div class="card-body">
                    <input type="text" id="simNumber" class="form-control mb-2" placeholder="Enter SIM Number (e.g., SIM001)">
                    <button id="validateSimBtn" class="btn btn-primary">Validate SIM</button>
                    <div id="simResult" class="result-area"></div>
                </div>
            </div>

            <!-- Special Offers Card -->
            <div class="card">
                <div class="card-header bg-info text-white">Special Offers</div>
                <div class="card-body" id="offersList">Loading...</div>
            </div>
        </div>

        <div class="col-md-6">
            <!-- ID Proof Validation Card -->
            <div class="card">
                <div class="card-header bg-danger text-white">ID Proof Validation</div>
                <div class="card-body">
                    <label>Select Customer:</label>
                    <select id="customerSelect" class="form-select mb-2">
                        <option value="">-- Select Customer --</option>
                    </select>
                    <input type="text" id="idNumber" placeholder="ID Proof Number" class="form-control mb-2">
                    <input type="text" id="idType" placeholder="ID Type (AADHAR/PAN)" class="form-control mb-2">
                    <button id="validateIdBtn" class="btn btn-danger">Validate ID</button>
                    <div id="idResult" class="result-area"></div>
                </div>
            </div>

            <!-- Validate Customer Details Card -->
            <div class="card">
                <div class="card-header bg-warning">Validate Customer Details</div>
                <div class="card-body">
                    <input type="text" id="fname" placeholder="First Name" class="form-control mb-2">
                    <input type="text" id="lname" placeholder="Last Name" class="form-control mb-2">
                    <input type="email" id="cemail" placeholder="Email" class="form-control mb-2">
                    <button id="validateDetailsBtn" class="btn btn-secondary">Validate</button>
                    <div id="detailsResult" class="result-area"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const simInput = document.getElementById("simNumber");
    if (sessionStorage.getItem("lastSimNumber")) {
        simInput.value = sessionStorage.getItem("lastSimNumber");
    }
    simInput.addEventListener("input", function() {
        sessionStorage.setItem("lastSimNumber", this.value);
    });

    function showMessage(elementId, message, isError = false) {
        const el = document.getElementById(elementId);
        if (el) {
            el.innerHTML = `<div class="alert alert-${isError ? 'danger' : 'info'} alert-dismissible fade show" role="alert">
                                ${message}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>`;
        }
    }

    async function loadOffers() {
        try {
            const res = await fetch("/api/offers");
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const offers = await res.json();
            let html = '<ul class="list-group">';
            offers.forEach(off => {
                html += `<li class="list-group-item"><b>${off.offerName}</b>: ${off.description} (${off.discountPercentage}% off)</li>`;
            });
            html += '</ul>';
            document.getElementById("offersList").innerHTML = html;
        } catch (err) {
            console.error(err);
            document.getElementById("offersList").innerHTML = '<div class="alert alert-danger">Failed to load offers</div>';
        }
    }

    async function loadCustomersForDropdown() {
        try {
            const res = await fetch("/api/customers/list");
            if (!res.ok) throw new Error();
            const customers = await res.json();
            const select = document.getElementById("customerSelect");
            select.innerHTML = '<option value="">-- Select Customer --</option>';
            customers.forEach(cust => {
                select.innerHTML += `<option value="${cust.id}">${cust.firstName} ${cust.lastName} (${cust.email})</option>`;
            });
        } catch (err) {
            console.error("Failed to load customers", err);
        }
    }

    // Validate SIM
    document.getElementById("validateSimBtn").addEventListener("click", async () => {
        const simNumber = simInput.value.trim();
        if (!simNumber) {
            showMessage("simResult", "Please enter a SIM number.", true);
            return;
        }
        try {
            const res = await fetch(`/api/sim/validate?simNumber=${encodeURIComponent(simNumber)}`, { method: "POST" });
            const data = await res.json();
            showMessage("simResult", data.message, data.status !== "VALID");
        } catch (err) {
            showMessage("simResult", "Network error", true);
        }
    });

    // Validate Customer Details
    document.getElementById("validateDetailsBtn").addEventListener("click", async () => {
        const fname = document.getElementById("fname").value.trim();
        const lname = document.getElementById("lname").value.trim();
        const email = document.getElementById("cemail").value.trim();
        if (!fname || !lname || !email) {
            showMessage("detailsResult", "Please fill all fields.", true);
            return;
        }
        try {
            const res = await fetch(`/api/customer/validate?firstName=${encodeURIComponent(fname)}&lastName=${encodeURIComponent(lname)}&email=${encodeURIComponent(email)}`, { method: "POST" });
            const data = await res.json();
            showMessage("detailsResult", data.message, !data.valid);
        } catch (err) {
            showMessage("detailsResult", "Network error", true);
        }
    });

    // Validate ID Proof
    document.getElementById("validateIdBtn").addEventListener("click", async () => {
        const customerId = document.getElementById("customerSelect").value;
        const idNumber = document.getElementById("idNumber").value.trim();
        const idType = document.getElementById("idType").value.trim();
        if (!customerId) {
            showMessage("idResult", "Please select a customer.", true);
            return;
        }
        if (!idNumber || !idType) {
            showMessage("idResult", "Please fill both ID proof fields.", true);
            return;
        }
        try {
            const res = await fetch(`/api/customer/idproof/validate?customerId=${customerId}&idProofNumber=${encodeURIComponent(idNumber)}&idProofType=${encodeURIComponent(idType)}`, { method: "POST" });
            const data = await res.json();
            showMessage("idResult", data.message, !data.valid);
        } catch (err) {
            console.error(err);
            showMessage("idResult", "Network error", true);
        }
    });

    // Logout
    document.getElementById("logoutBtn").addEventListener("click", async () => {
        await fetch("/api/auth/logout", { method: "POST" });
        window.location.href = "/";
    });

    loadOffers();
    loadCustomersForDropdown();
</script>
</body>
</html>
