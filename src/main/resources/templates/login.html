<!DOCTYPE html>
<html>
<head>
    <title>SIM Activation Portal - Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white"><h3 class="mb-0">Admin Login</h3></div>
                <div class="card-body">
                    <div id="errorMsg" class="alert alert-danger d-none"></div>
                    <form id="loginForm">
                        <div class="mb-3"><label>Username</label><input type="text" id="username" class="form-control" placeholder="admin" required></div>
                        <div class="mb-3"><label>Password</label><input type="password" id="password" class="form-control" placeholder="admin" required></div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    <hr><small class="text-muted">Use: admin / admin</small>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const errDiv = document.getElementById("errorMsg");
        errDiv.classList.add("d-none");
        try {
            const response = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            });
            const data = await response.json();
            if (data.success) window.location.href = "/dashboard";
            else { errDiv.innerText = data.message; errDiv.classList.remove("d-none"); }
        } catch(err) { errDiv.innerText = "Network error"; errDiv.classList.remove("d-none"); }
    });
</script>
</body>
</html>
