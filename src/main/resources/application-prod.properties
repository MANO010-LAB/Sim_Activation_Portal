# ===============================
# PRODUCTION (Railway + MySQL)
# ===============================

# Use the JDBC URL you converted from Railway's MYSQL_URL
# Create an environment variable named JDBC_DATABASE_URL with the converted URL
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Optional: Railway also provides these, but they are not needed if URL includes credentials
# spring.datasource.username=${MYSQLUSER}
# spring.datasource.password=${MYSQLPASSWORD}

# JPA / Hibernate for MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Spring Boot auto-detects the dialect; no need to specify

# Server – Railway injects PORT
server.port=${PORT:8080}

# Thymeleaf
spring.thymeleaf.cache=true